  // Proper UTF-8 decoding to bytes -> Blob (avoid mojibake)
  function b64ToUtf8Bytes(b64) {
    const bin = atob(b64);
    const len = bin.length;
    const bytes = new Uint8Array(len);
    for (let i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i) & 0xff;
    return bytes;
  }
  function makeBlobUrlFromB64Html(b64) {
    const bytes = b64ToUtf8Bytes(b64);
    const blob = new Blob([bytes], { type: "text/html;charset=utf-8" });
    return URL.createObjectURL(blob);
  }

  const cakeUrl  = makeBlobUrlFromB64Html(CAKE_B64);
  const booksUrl = makeBlobUrlFromB64Html(BOOKS_B64);

  const cake = document.getElementById('cake');
  const books = document.getElementById('books');
  cake.src = cakeUrl;
  books.src = booksUrl;

  const toggleBtn = document.getElementById('toggle');
  const reloadBtn = document.getElementById('reload');
  const status = document.getElementById('status');

  const KEY = 'switcher.current'; // 'cake' or 'books'

  function show(which) {
    cake.classList.remove('active');
    books.classList.remove('active');
    if (which === 'books') {
      books.classList.add('active');
      status.textContent = '表示：本棚';
      toggleBtn.textContent = 'ケーキに切り替え';
    } else {
      cake.classList.add('active');
      status.textContent = '表示：ケーキ';
      toggleBtn.textContent = '本棚に切り替え';
      which = 'cake';
    }
    localStorage.setItem(KEY, which);
  }

  toggleBtn.onclick = () => {
    const cur = localStorage.getItem(KEY) || 'cake';
    show(cur === 'cake' ? 'books' : 'cake');
  };

  reloadBtn.onclick = () => {
    const cur = localStorage.getItem(KEY) || 'cake';
    const iframe = cur === 'books' ? books : cake;
    // Recreate Blob URL to force reload
    const old = iframe.src;
    URL.revokeObjectURL(old);
    iframe.src = (cur === 'books') ? makeBlobUrlFromB64Html(BOOKS_B64) : makeBlobUrlFromB64Html(CAKE_B64);
  };

  // Initialize
  show(localStorage.getItem(KEY) || 'cake');
})();
</script>
